name: Weekly Newsletter

on:
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC (midnight Brasilia time)
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Scrape opportunities
        run: node scripts/scraper.js

      - name: Generate newsletter
        run: node scripts/generate-newsletter.js

      - name: Send to subscriber list
        run: node scripts/send-to-list.js

      - name: Commit scraped data and newsletter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ newsletter/
          git diff --staged --quiet || git commit -m "chore: weekly scrape $(date -u +%Y-%m-%d)"
          git push
